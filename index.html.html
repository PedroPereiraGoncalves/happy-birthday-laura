<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura - 15 Anos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050510;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .fade-in {
            animation: fadeIn 3s forwards;
        }

        .fade-out {
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* BOTÃO DE INÍCIO */
        #start-btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-btn:hover {
            background: #fff;
            color: #050510;
            box-shadow: 0 0 20px #fff;
        }

        /* FASE 1: NÚCLEO */
        #core-container {
            position: relative;
            cursor: pointer;
        }

        #energy-core {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 20px #fff;
            transition: all 0.5s ease;
        }

        .message-text {
            position: absolute;
            top: 20vh;
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 300;
            width: 80%;
            max-width: 600px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .error-text {
            color: #ff3333;
            text-shadow: 0 0 15px #ff3333;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* FASE 2: JOIAS DO INFINITO */
        #jewels-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 800px;
        }

        .jewel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease; /* Aparecimento lento */
        }

        .jewel {
            width: 35px;
            height: 45px;
            border-radius: 40% 40% 50% 50%; /* Formato de joia orgânica */
            margin-bottom: 15px;
            animation: glowPulse 3s infinite alternate;
        }

        .jewel-label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        @keyframes glowPulse {
            from { transform: scale(1) translateY(0); filter: brightness(1); }
            to { transform: scale(1.05) translateY(-10px); filter: brightness(1.5); }
        }

        #laura-btn {
            margin-top: 50px;
            padding: 15px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.5s;
            opacity: 0;
        }

        #laura-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        #white-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
        }

        /* FASE 3: MEMÓRIAS COM IMAGENS */
        #text-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .scene-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            padding: 20px;
            position: absolute;
            opacity: 0;
        }

        .scene-img {
            max-width: 80%;
            max-height: 40vh;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            margin-bottom: 30px;
            object-fit: cover;
        }

        .scene-text {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .highlight { font-weight: 700; }

        /* FASE 5: FINAL */
        #final-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 40px;
        }

        .final-line {
            font-size: 1.5rem;
            margin: 15px 0;
            opacity: 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .miles-line {
            font-size: 2rem;
            font-weight: 700;
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333;
        }

        .spider-line {
            font-size: 1.8rem;
            color: #00aaff;
            text-shadow: 0 0 20px #00aaff;
        }

    </style>
</head>
<body>

    <audio id="bg-music" src="vingadores.mp3" loop></audio>

    <canvas id="starfield"></canvas>
    
    <div id="white-flash"></div>

    <div id="app">
        <button id="start-btn">Iniciar Sequência</button>

        <div id="core-container" class="hidden">
            <div id="energy-core"></div>
        </div>
        <div id="p1-message" class="message-text hidden">Toque para tentar abrir a jóia.</div>
        <div id="p1-error" class="message-text hidden">
            <div class="error-text">ERRO</div>
            <div>A jóia é inestimável, portanto indestrutivel.</div>
            <div style="font-size: 1rem; margin-top: 10px; color: #aaa;">Motivo: clique mais rápido para ver uma fração de seu poder!</div>
        </div>

        <div id="jewels-container" class="hidden"></div>
        <button id="laura-btn" class="hidden">EU SOU LAURA GONÇALVES</button>

        <div id="text-stage" class="hidden"></div>
    </div>

    <script>
        // --- Fundo Estrelado ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    alpha: Math.random()
                });
            }
        }
        
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
                
                star.y -= 0.2;
                if (star.y < 0) star.y = canvas.height;
                star.alpha += (Math.random() - 0.5) * 0.05;
                if(star.alpha < 0.1) star.alpha = 0.1;
                if(star.alpha > 1) star.alpha = 1;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        const app = document.getElementById('app');
        const bgMusic = document.getElementById('bg-music');

        // --- Lógica Principal ---
        document.getElementById('start-btn').addEventListener('click', async (e) => {
            // Inicia a música
            bgMusic.volume = 0.5;
            bgMusic.play().catch(e => console.log("Áudio bloqueado pelo navegador até interação."));
            
            e.target.style.display = 'none';
            await startPhase1();
        });

        async function startPhase1() {
            const coreCont = document.getElementById('core-container');
            const core = document.getElementById('energy-core');
            coreCont.classList.remove('hidden');
            
            const colors = ['#800080', '#FF1493', '#0000FF', '#FFFFFF'];
            let size = 50;
            
            for (let i = 0; i < 7; i++) {
                size += 15;
                core.style.width = `${size}px`;
                core.style.height = `${size}px`;
                const color = colors[i % colors.length];
                core.style.background = color;
                core.style.boxShadow = `0 0 ${size}px ${color}`;
                await sleep(1000);
            }

            core.style.background = '#fff';
            core.style.boxShadow = '0 0 100px #fff';
            await sleep(1000);

            const p1Msg = document.getElementById('p1-message');
            p1Msg.classList.remove('hidden');
            p1Msg.classList.add('fade-in');

            let clicks = 0;
            let lastClickTime = 0;

            coreCont.addEventListener('click', () => {
                const now = Date.now();
                clicks++;

                if (clicks === 1) {
                    p1Msg.classList.add('hidden');
                    const errorMsg = document.getElementById('p1-error');
                    errorMsg.classList.remove('hidden');
                    errorMsg.classList.add('fade-in');
                } else {
                    if (now - lastClickTime < 400 && clicks >= 4) {
                        coreCont.style.display = 'none';
                        document.getElementById('p1-error').style.display = 'none';
                        startPhase2();
                    }
                }
                lastClickTime = now;
                
                core.style.transform = `scale(${1 + (clicks*0.05)})`;
                setTimeout(() => core.style.transform = 'scale(1)', 100);
            });
        }

        async function startPhase2() {
            const container = document.getElementById('jewels-container');
            container.classList.remove('hidden');
            
            const jewels = [
                { color: '#00aaff', name: 'Companheira' }, // Espaço (Tesseract)
                { color: '#00ff00', name: 'Amiga' },       // Tempo (Olho de Agamotto)
                { color: '#800080', name: 'Inteligente' }, // Poder (Orbe)
                { color: '#ff3333', name: 'Determinada' }, // Realidade (Éter)
                { color: '#ffff00', name: 'Habilidosa' },  // Mente (Cetro)
                { color: '#ffa500', name: 'Engraçada' },   // Alma (Vormir)
                { color: '#ffffff', name: 'Inestimável' }  // Joia Branca Customizada
            ];

            // Aparecimento lento e dramático das joias
            for (let i = 0; i < jewels.length; i++) {
                const j = jewels[i];
                const div = document.createElement('div');
                div.className = 'jewel-wrapper';
                div.innerHTML = `
                    <div class="jewel" style="background: ${j.color}; box-shadow: 0 0 30px 10px rgba(${hexToRgb(j.color)}, 0.5);"></div>
                    <div class="jewel-label" style="color: ${j.color}; text-shadow: 0 0 10px ${j.color};">${j.name}</div>
                `;
                container.appendChild(div);
                
                await sleep(500); 
                div.style.opacity = 1;
                div.style.transform = 'translateY(0)';
                await sleep(1500); // Tempo longo como Guerra Infinita
            }

            await sleep(1000);
            const btn = document.getElementById('laura-btn');
            btn.classList.remove('hidden');
            setTimeout(() => btn.style.opacity = 1, 100);

            btn.addEventListener('click', async () => {
                const flash = document.getElementById('white-flash');
                flash.style.opacity = 1;
                flash.style.transition = 'opacity 0.5s ease';
                await sleep(600);
                
                container.style.display = 'none';
                btn.style.display = 'none';
                
                flash.style.opacity = 0;
                flash.style.transition = 'opacity 2s ease';
                
                startPhase3();
            });
        }

        // Função auxiliar para converter cor para sombra da joia
        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
        }

        async function displayScene(sceneData, duration = 6000) {
            const stage = document.getElementById('text-stage');
            stage.classList.remove('hidden');
            
            const div = document.createElement('div');
            div.className = 'scene-container fade-in';
            
            // Verifica se a imagem foi passada (O src aponta para arquivos locais na sua pasta)
            let imgHTML = sceneData.img ? `<img src="${sceneData.img}" class="scene-img" alt="Memória" onerror="this.style.display='none'">` : '';
            
            div.innerHTML = `
                ${imgHTML}
                <div class="scene-text">${sceneData.text}</div>
            `;
            
            stage.innerHTML = '';
            stage.appendChild(div);
            
            await sleep(duration);
            
            div.classList.replace('fade-in', 'fade-out');
            await sleep(2000);
        }

        async function startPhase3() {
            // Substitua 'imagem1.jpg', etc., pelos nomes exatos dos seus arquivos de foto na pasta
            const scenes = [
                { text: "Lembra das nossas brincadeiras de espião na casa da vó? Eu tinha o passo do pantera negra e voce sempre fazia barulhos com os pés... a vó sempre te via, mas a lenda jamais era visto!", img: "imagem1.jpg" },
                { text: "Minha aste de segurar PIPA, pequenininha mas obediente na época... kkkk desculpa Laurinha", img: "imagem2.jpg" },
                { text: "Desenhos e filmes juntos lembra? Momentos tão passageiros mas valiosos.", img: "imagem3.jpg" },
                { text: "Agora fala até minha lingua, dá pra conversar perfeitamente sobre qualquer assunto...", img: "imagem4.jpg" },
                { text: "Laura pedindo conselhos para o irmão sábio, valente, forte, esbelto...", img: "imagem5.jpg" },
                { text: "Laura tocando teclado de maneira exemplar...", img: "imagem6.jpg" },
                { text: "Laura lavando o banheiro. Ama lavar o banheiro, é a paixão dela.", img: "imagem7.jpg" },
                { text: "Você já foi muitas coisas durante essa caminhada mas hoje é principalmente minha amiga e companheira e AGORA uma Mulher.", img: "imagem8.jpg" }
            ];

            for (let scene of scenes) {
                await displayScene(scene, 6500); // Mais tempo para ler e ver a foto
            }
            startPhase4();
        }

        async function startPhase4() {
            const stage = document.getElementById('text-stage');
            stage.innerHTML = '';
            
            const jewelDiv = document.createElement('div');
            jewelDiv.className = 'jewel fade-in';
            jewelDiv.style.background = '#fff';
            jewelDiv.style.boxShadow = '0 0 40px #fff';
            jewelDiv.style.margin = '0 auto 40px auto';
            stage.appendChild(jewelDiv);

            const lines = [
                "Jóias podem ser encontradas em qualquer lugar.",
                "Mas algumas existem apenas uma vez.",
                "Em todo o espaço.",
                "Em todo o tempo.",
                "Em todos os universos.",
                "<span class='highlight' style='font-size: 2.5rem;'>Laura Gonçalves.</span>"
            ];

            for (let i = 0; i < lines.length; i++) {
                const p = document.createElement('div');
                p.className = 'final-line fade-in';
                p.innerHTML = lines[i];
                stage.appendChild(p);
                await sleep(3000);
            }
            
            await sleep(2000);
            stage.classList.add('fade-out');
            await sleep(2000);
            
            startPhase5();
        }

        async function startPhase5() {
            const stage = document.getElementById('text-stage');
            stage.className = ''; 
            stage.innerHTML = '<div id="final-container"></div>';
            const cont = document.getElementById('final-container');

            const p1 = document.createElement('div');
            p1.className = 'scene-text fade-in';
            p1.style.position = 'relative';
            p1.style.marginBottom = '50px';
            p1.innerHTML = "No grande cálculo do multiverso, seus 15 anos são apenas os primeiros passos que te levaram muito além do que você sonha, apenas keep going!";
            cont.appendChild(p1);

            await sleep(6000);
            p1.classList.replace('fade-in', 'fade-out');
            await sleep(2000);
            p1.style.display = 'none';

            const endings = [
                { text: "Lembre-se...", class: "final-line" },
                { text: "Meu nome é Miles Morales.", class: "final-line miles-line" },
                { text: "Eu sou o Homem-Aranha.", class: "final-line spider-line" },
                { text: "E sempre serei seu fiel companheiro.", class: "final-line" },
                { text: "Irmão.", class: "final-line highlight", size: "2rem" },
                { text: "Te Amo Laurinha.", class: "final-line highlight", size: "2rem" }
            ];

            for (let i = 0; i < endings.length; i++) {
                const line = document.createElement('div');
                line.className = `${endings[i].class} fade-in`;
                line.innerHTML = endings[i].text;
                if(endings[i].size) line.style.fontSize = endings[i].size;
                cont.appendChild(line);
                await sleep(3000);
            }

            // Diminui a música gradualmente no final
            let fadeAudio = setInterval(function () {
                if (bgMusic.volume > 0.05) {
                    bgMusic.volume -= 0.05;
                } else {
                    bgMusic.pause();
                    clearInterval(fadeAudio);
                }
            }, 1000);
        }
    </script>
</body>
</html>
